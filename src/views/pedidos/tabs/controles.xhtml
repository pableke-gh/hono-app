<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<form is="pedido-controles" action="/uae/pedidos">
		<h2 class="underline">Controles de consistencia</h2>

		<div class="ui-blocks">
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.ejercicio']}" escape="false" />:</div>
				<select name="ej" is="data-list" tabindex="1"></select>
			</label>
			<label class="ui-block-xl">
				<div class="label">Control de consistencia:</div>
				<select name="tipo" is="data-list" tabindex="2" title="Tipo de control a consultar">
					<option value="1">Pedidos que tienen un JG asociado con un importe total superior en un 50% al importe total del pedido</option>
					<option value="2">Pedidos que tienen un JG asociado con un NIF proveedor distinto al del pedido</option>
					<option value="3">Pedidos que tienen un JG asociado con aplicación presupuestaria distinta a la del pedido</option>
					<option value="4">Pedidos asociados a más de un JG activo</option>
					<option value="5">Pedidos en estado aprobado que no tienen expediente asociado OR</option>
					<option value="6">Pedidos en estado aprobado que tienen asociado un expediente sin JG asociados y con saldo 0</option>
				</select>
			</label>
		</div>

		<div class="navbar">
			<a href="#tab-init" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}" tabindex="13">
				<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
			<button type="submit" is="btn-form" class="btn btn-info" tabindex="13"><i class="far fa-search btn-icon-left"></i>Buscar</button>
			<a href="#tab-action-recontrol" class="btn btn-warn" tabindex="14"><i class="far fa-times-circle btn-icon-left"></i>Limpiar</a>
		</div>
	</form>

	<table is="control-table" class="tb-xeco">
		<thead>
			<tr>
				<th>Código</th><th class="hide-xs">Estado</th>
				<th>Expediente</th><th>Nif Proveedor</th><th class="hide-xs">Proveedor</th>
				<th class="hide-xs">F. Solicitud</th><th>Importe</th><th class="hide-sm">Solicitante</th>
				<th class="hide-md">Descripción</th><th class="no-print">Acciones</th>
			</tr>
		</thead>
		<tbody></tbody>
		<tfoot>
			<tr><td colspan="99" class="table-refresh" data-refresh="text-render">Solicitudes: @size;</td></tr>
		</tfoot>
	</table>

	<a href="#tab-init" class="btn btn-info" title="Volver a la consulta de solicitudes">
		<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
</html>
