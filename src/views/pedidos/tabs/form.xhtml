<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<form id="pedido-form" is="pedido-form" method="post" enctype="multipart/form-data">
	<div class="card-xeco">
		<h2 class="form-refresh" data-refresh="text-render">@getTitulo; @getCodigo;</h2>
		<div class="ui-blocks">
			<div class="ui-block-btn">
				<a href="#tab-action-adjunto" class="btn btn-info form-refresh" title="Descargar / visualizar la documentación asociada" data-refresh="getAdjunto">Documentación Adjunta<i class="far fa-paperclip btn-icon-right"></i></a>
				<a href="#tab-action-clickNext" class="btn btn-info form-refresh" tiitle="Presupuesto del proveedor" data-refresh="isEditable"><i class="fas fa-search btn-icon-left"></i>Adjuntar Documentación</a>
				<input type="file" name="adjunto" is="file-input" class="hide required" />
				<div class="ui-errtip"></div> 
			</div>
			<label class="ui-block">
				<div class="label required">Nº de referencia:</div>
				<input type="text" name="ref" is="text-input" class="ui-input required" tabindex="1" /> 
				<div class="ui-errtip"></div> 
			</label>
			<div class="ui-block-row text-height form-refresh" data-refresh="filename" data-event="adjunto"></div>
		</div>
		<hr class="slim"/>

		<div class="ui-blocks">
			<label class="ui-block-xl autocomplete">
				<div class="label required">Proveedor (CIF / NIF / Nombre):</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" name="proveedor" is="proveedor-input" class="ui-autocomplete" tabindex="2" placeholder="Indique un proveedor" /> 
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block-lg">
				<div class="label required">Correo del Proveedor:</div>
				<input type="text" name="email" is="text-input" class="ui-input required" tabindex="3" placeholder="nombre@correo.com" /> 
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block-row">
				<div class="label required">Descripción del servicio o bien a contratar:</div>
				<textarea name="desc" is="text-area" class="ui-input ui-ta required" tabindex="4" maxlength="1000"></textarea>
				<div class="ui-errtip"></div>
			</label>
		</div>
		<div class="ui-blocks">
			<label class="ui-block-xl">
				<div class="label required">Categoría:</div>
				<select name="categoria" is="categoria-pedido" class="ui-input ui-select" tabindex="5">
					<option value="2">Reparación y mantenimiento (también costes de materiales y repuestos)</option>
					<option value="3">Otros servicios</option>
					<option value="4">Material (exceptuando el destinado a reparaciones), suministros y otros gastos</option>
					<option value="5">Arrendamientos</option>
					<option value="6">Inventariable (capítulo 6)</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label required">Subcategoría:</div>
				<select name="subcategoria" is="data-list" class="ui-input ui-select" tabindex="5"></select>
			</label>
			<label class="ui-block hide">
				<div class="label required">Datos de inventario:</div>
				<select name="inventario" is="data-list" class="ui-input ui-select" tabindex="5"></select>
			</label>
		</div>
		<div id="info-categorias" class="notice notice-info"></div>
		<div class="ui-blocks">
			<label class="ui-block-xl autocomplete">
				<div class="label required">Orgánica:</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" name="organica" is="organica-input" class="ui-autocomplete" tabindex="6" placeholder="Introduce una orgánica" /> 
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
			<div id="org-info" class="ui-block-row text-height" data-template="@ej; @org; @func; @eco; ($imp; €)"></div>
		</div>

		<!-- Importes -->
		<hr class="slim"/>
		<div class="ui-blocks">
			<label class="ui-block">
				<div class="label required">Importe estimado:</div>
				<input type="text" name="imp" is="float-input" class="ui-input required gt0" tabindex="7"/> €
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block">
				<div class="label required">IVA:</div>
				<select name="iva" is="data-list" class="ui-input ui-select" tabindex="8">
					<option value="0">0 %</option>
					<option value="4">4 %</option>
					<option value="10">10 %</option>
					<option value="21">21 %</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label required">Importe IVA:</div>
				<input type="text" name="impIva" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
			<label class="ui-block">
				<div class="label required">Importe Total:</div>
				<input type="text" name="impTotal" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
			<label class="ui-block">
				<div class="label required">Prorrata:</div>
				<input type="text" name="prorrata" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> %
			</label>
			<label class="ui-block">
				<div class="label required">Importe Presupuesto:</div>
				<input type="text" name="impPpto" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
		</div>
	</div>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-back" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}">
			<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
		<button type="submit" is="btn-form" class="btn btn-green form-refresh" data-refresh="isEditable" title="Poner la solicitud a la firma">
			#{msg['lbl.btn.enviar']}<i class="fas fa-caret-right btn-icon-right"></i></button>

		<a href="#tab-action-firmar" class="btn btn-green form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.firmar']}">
			<i class="far fa-file-signature btn-icon-left"></i>#{msg['lbl.btn.firmar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.rechazar']}">
			<i class="fas fa-times-circle btn-icon-left"></i>#{msg['lbl.btn.rechazar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isCancelable" title="#{msg['tit.btn.cancelar']}">
			<i class="fas fa-times-circle btn-icon-left"></i>#{msg['lbl.btn.cancelar']}</a>

		<a href="#tab-action-report" class="btn btn-danger form-refresh" data-refresh="isDocumentable" title="Informe PRESTO">
			<i class="fal fa-file-pdf btn-icon-left"></i>Informe</a>

		<a href="#tab-action-remove" class="btn btn-danger form-refresh" data-refresh="isRemovable" title="Borra la solicitud del sistema"> 
			<i class="fal fa-trash-alt btn-icon-left"></i>Eliminar</a>
	</div>
	<ui:include src="../parts/firmas.xhtml"></ui:include>
	</form>
</html>
