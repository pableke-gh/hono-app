<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<h2 class="underline form-refresh" data-refresh="text-render">@getTitulo; @codigo;</h2>
	<form is="pedido-form" method="post" enctype="multipart/form-data">
	<div class="xeco-card">
		<div class="ui-blocks">
			<div class="ui-block-row form-refresh" data-refresh="isEditable">
				<a href="#tab-action-clickNext" class="btn btn-info"><i class="fas fa-search btn-icon-left"></i>Adjuntar Documentación</a>
				<input type="file" name="adjunto" is="file-input" class="hide" />
				<span class="form-refresh" data-refresh="clear"></span>
			</div>
		</div>
		<div class="ui-blocks">
			<label class="ui-block-xl">
				<div class="label">Categoría:</div>
				<select name="categoria" is="categoria-pedido" class="ui-input ui-select" data-editable="is-editable" tabindex="5">
					<option value="2">Reparación y mantenimiento (también costes de materiales y repuestos necesarios para los trabajos)</option>
					<option value="3">Otros servicios</option>
					<option value="4">Material (exceptuando el destinado a reparaciones), suministros y otros gastos</option>
					<option value="5">Arrendamientos</option>
					<option value="6">Inventariable (capítulo 6)</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label">Subcategoría:</div>
				<select name="subcategoria" is="data-list" class="ui-input ui-select" data-editable="is-editable" tabindex="5"></select>
			</label>
			<label class="ui-block hide">
				<div class="label">Datos de inventario:</div>
				<select name="inventario" is="data-list" class="ui-input ui-select" data-editable="is-editable" tabindex="5"></select>
			</label>
		</div>
		<div id="info-categorias" class="notice notice-info"></div>
		<div class="ui-blocks">
			<label class="ui-block-xl autocomplete">
				<div class="label required">Orgánica:</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" name="organica" is="organica-input" class="ui-autocomplete" tabindex="6" placeholder="Introduce una orgánica" /> 
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
		</div>
	</div>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-back" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}">
			<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
		<button type="submit" name="save" class="btn btn-green form-refresh" data-refresh="isEditable" data-editable="isEditable" data-confirm="msgSend" title="Poner solicitud a la firma">
			#{msg['lbl.btn.enviar']}<i class="fas fa-caret-right btn-icon-right"></i></button>

		<a href="#tab-action-firmar" class="btn btn-green form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.firmar']}">
			<i class="far fa-file-signature btn-icon-left"></i>#{msg['lbl.btn.firmar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.rechazar']}">
			<i class="fas fa-times-circle btn-icon-left"></i>#{msg['lbl.btn.rechazar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isCancelable" title="#{msg['tit.btn.cancelar']}">
			<i class="fas fa-times-circle btn-icon-left"></i>#{msg['lbl.btn.cancelar']}</a>

		<a href="#tab-action-report" class="btn btn-danger form-refresh" data-refresh="isDocumentable" title="Informe PRESTO">
			<i class="fal fa-file-pdf btn-icon-left"></i>Informe</a>

		<a href="#tab-action-remove" class="btn btn-danger form-refresh" data-refresh="isRemovable" title="Borra la solicitud del sistema"> 
			<i class="fal fa-trash-alt btn-icon-left"></i>Eliminar</a>
	</div>
	</form>
	<ui:include src="../parts/firmas.xhtml"></ui:include>
</html>
