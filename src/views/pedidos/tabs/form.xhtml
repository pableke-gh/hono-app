<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<div class="card-xeco">
		<h2 class="form-refresh" data-refresh="text-render">@getTitulo; @getCodigo;</h2>
		<div class="ui-blocks">
			<div class="ui-block-btn">
				<button type="button" is="btn-ppto" class="btn btn-info"></button>
				<input type="file" name="adjunto" is="ppto-file" class="hide" data-filename=".spi-file" />
				<div class="ui-errtip"></div> 
			</div>
			<label class="ui-block">
				<div class="label required">Referencia proveedor:</div>
				<input type="text" name="ref" is="ref-input" class="ui-input" tabindex="1" /> 
				<div class="ui-errtip"></div> 
			</label>
			<div class="ui-block-row text-height spi-file"></div>
		</div>
		<hr class="slim"/>

		<div class="ui-blocks">
			<label class="ui-block-xl autocomplete">
				<div class="label required">Proveedor (CIF / NIF / Nombre):</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" name="proveedor" is="proveedor-input" class="ui-autocomplete" tabindex="2" placeholder="Indique un proveedor" /> 
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block-lg">
				<div class="label required">Correo del Proveedor:</div>
				<input type="email" name="email" is="email-input" class="ui-input" required="1" tabindex="3" placeholder="nombre@correo.com" /> 
				<div class="ui-errtip"></div> 
			</label>
			<div id="prov-info" class="ui-block-row text-height"></div>
			<hr class="slim ui-block-row"/>
			<label class="ui-block-row">
				<div class="label required">Descripción del servicio o bien a contratar:</div>
				<textarea name="desc" is="text-area" class="ui-input ui-ta" required="1" tabindex="4" maxlength="1000"></textarea>
				<div class="ui-errtip"></div>
			</label>
		</div>
		<div class="ui-blocks">
			<label class="ui-block-xl">
				<div class="label required">Categoría:</div>
				<select name="categoria" is="categoria-pedido" class="ui-input ui-select" tabindex="5">
					<option value="2">Reparación y mantenimiento (también costes de materiales y repuestos necesarios para los trabajos)</option>
					<option value="3">Otros servicios de empresas y profesionales</option>
					<option value="4">Material no inventariable (exceptuando el destinado a reparaciones)</option>
					<option value="6">Equipos y bienes inventariables (incluye costes de instalación y puesta en marcha)</option>
					<option value="5">Alquileres / Arrendamientos</option>
				</select>
			</label>
			<label class="ui-block-xl">
				<div class="label required">Subcategoría:</div>
				<select name="subcategoria" is="data-list" class="ui-input ui-select" tabindex="5"></select>
			</label>
		</div>
		<label class="ui-blocks hide">
			<div class="ui-block-info"><b>Sustituye a un bien similar dado previamente de baja:</b></div>
			<input type="checkbox" name="inventario" is="check-input" value="2" class="ui-check" tabindex="5" data-disabled="isDisabled"/>
		</label>
		<div class="ui-blocks">
			<label class="ui-block-xl autocomplete">
				<div class="label required">Partida presupuestaria:</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" name="aplicacion" is="aplicacion-input" class="ui-autocomplete" tabindex="6" placeholder="Introduce una orgánica" /> 
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
			<div id="org-info" class="ui-block-info text-height"></div>
		</div>

		<!-- Importes -->
		<hr/>
		<div class="ui-blocks">
			<label class="ui-block">
				<div class="label required">Importe estimado sin IVA:</div>
				<input type="text" name="imp" is="float-input" class="ui-input" required="gt0" tabindex="7"/> €
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block">
				<div class="label required">IVA:</div>
				<select name="iva" is="data-list" class="ui-input ui-select" tabindex="8">
					<option value="0">0 %</option>
					<option value="4">4 %</option>
					<option value="10">10 %</option>
					<option value="21">21 %</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label required">Importe IVA:</div>
				<input type="text" name="impIva" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
			<label class="ui-block">
				<div class="label required">Importe Total:</div>
				<input type="text" name="impTotal" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
			<label class="ui-block">
				<div class="label required">Prorrata:</div>
				<input type="text" name="prorrata" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> %
			</label>
			<label class="ui-block">
				<div class="label required">Importe partida presupuestaria:</div>
				<input type="text" name="impPpto" is="float-input" class="ui-input disabled" data-editable="manual" disabled/> €
			</label>
		</div>
	</div>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-back" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}">
			<i class="fas fa-caret-left"></i>#{msg['lbl.btn.volver']}</a>
		<button type="submit" is="btn-save" class="btn btn-green" title="Poner la solicitud a la firma">
			#{msg['lbl.btn.enviar']}<i class="fas fa-caret-right"></i></button>

		<a href="#tab-action-firmar" class="btn btn-green form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.firmar']}">
			<i class="far fa-file-signature"></i>#{msg['lbl.btn.firmar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isFirmable" title="#{msg['tit.btn.rechazar']}">
			<i class="fas fa-times-circle"></i>#{msg['lbl.btn.rechazar']}</a>
		<a href="#tab-reject" class="btn btn-error form-refresh" data-refresh="isCancelable" title="#{msg['tit.btn.cancelar']}">
			<i class="fas fa-times-circle"></i>#{msg['lbl.btn.cancelar']}</a>

		<a href="#tab-action-report" class="btn btn-danger form-refresh" data-refresh="isDocumentable" title="Informe PRESTO">
			<i class="fal fa-file-pdf"></i>Informe</a>

		<a href="#tab-action-remove" class="btn btn-danger form-refresh" data-refresh="isRemovable" title="Borra la solicitud del sistema"> 
			<i class="fal fa-trash-alt"></i>Eliminar</a>
	</div>
</html>
