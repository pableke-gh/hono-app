<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<div class="card-xeco">
		<h2 class="underline">Motivo / Causa del rechazo de la solicitud</h2>
		<p class="notice notice-info form-loaded">@codigo;: @desc;</p>

		<label class="ui-block">
			<div class="label required">Información asociada al rechazo:</div>
			<textarea name="rechazo" is="text-area" rows="8" class="editable-manual" title="Motivo / causa del rechazo" tabindex="1"></textarea>
			<div class="ui-errtip"></div>
		</label>
	</div>

	<div class="navbar">
		<a href="#tab-back" class="btn btn-info" tabindex="2">
			<i class="fas fa-caret-left"></i>#{msg['lbl.btn.volver']}</a>
		<button is="btn-rechazar" class="btn btn-error" title="#{msg['tit.btn.rechazar']}">
			<i class="far fa-times-circle"></i>#{msg['lbl.btn.rechazar']}</button>
		<button is="btn-cancelar" class="btn btn-error" title="#{msg['tit.btn.cancelar']}"> 
			<i class="far fa-times-circle"></i>#{msg['lbl.btn.cancelar']}</button>
	</div>
</html>
