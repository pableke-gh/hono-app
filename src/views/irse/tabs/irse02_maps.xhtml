<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<h2 class="underline form-refresh" data-refresh="text-render">@getTitulo; <i>@codigo;</i></h2>
	<div class="card-xeco">
		<h2>
			<img src="/uae/resources/images/speaker.png" width="30px"/>
			<span class="text-warn form-refresh" data-refresh="text-render">@getPasoMaps;</span>
			<span><h:outputText value="#{msg['uae.irse.tab2.msg.tit.maps']}" escape="false" /></span>
		</h2>
		<ui:include src="./irse02_info.xhtml"></ui:include>
		<div class="ui-blocks no-print form-refresh" data-refresh="isEditable">
			<label class="ui-block-xl autocomplete">
				<div class="label required"><h:outputText value="#{msg['lbl.sali']}" escape="false" />:</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" id="origen" name="origen" is="autocomplete-maps" class="ui-autocomplete ui-ruta" tabindex="30" title="#{msg['tit.ubicacion']}" placeholder="#{iris.getMsg('ph.ubicacion')}" />
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</label>
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.el.dia']}" escape="false" />:</div>
				<input type="date" id="f1" name="f1" is="date-input" class="ui-ruta" tabindex="31" />
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.a.las']}" escape="false" />:</div>
				<input type="time" id="h1" name="h1" is="time-input" class="ui-ruta" tabindex="32" placeholder="hh:mm" />
			</label>

			<label class="ui-block-xl autocomplete">
				<div class="label required"><h:outputText value="#{msg['lbl.llegue']}" escape="false" />:</div>
				<i class="fas fa-search ui-input-icon left"></i>
				<input type="search" id="destino" name="destino" is="autocomplete-maps" class="ui-autocomplete ui-ruta" tabindex="33" title="#{msg['tit.ubicacion']}" placeholder="#{iris.getMsg('ph.ubicacion')}"/>
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.el.dia']}" escape="false" />:</div>
				<input type="date" id="f2" name="f2" is="date-input" class="ui-ruta" tabindex="34" />
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.a.las']}" escape="false" />:</div>
				<input type="time" id="h2" name="h2" is="time-input" class="ui-ruta" tabindex="35" placeholder="hh:mm"/>
			</label>

			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.util']}" escape="false" />:</div>
				<select name="desp" is="data-list" class="ui-ruta" tabindex="37" title="#{msg['tit.medio.trans']}">
					<option value=""></option>
					<option value="1">#{iris.irse.rutas.getMsgDesp(1)}</option>
					<option value="8">#{iris.irse.rutas.getMsgDesp(8)}</option>
					<option value="6">#{iris.irse.rutas.getMsgDesp(6)}</option>
					<option value="2">#{iris.irse.rutas.getMsgDesp(2)}</option>
					<option value="3">#{iris.irse.rutas.getMsgDesp(3)}</option>
					<option value="4">#{iris.irse.rutas.getMsgDesp(4)}</option>
					<option value="5">#{iris.irse.rutas.getMsgDesp(5)}</option>
					<option value="7">#{iris.irse.rutas.getMsgDesp(7)}</option>
					<option value="9">#{iris.irse.rutas.getMsgDesp(9)}</option>
				</select>
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block hide grupo-matricula">
				<div class="label required"><h:outputText value="#{msg['lbl.matricula']}" escape="false" />:</div>
				<input type="text" name="matricula" is="text-input" maxlength="10" tabindex="38" class="ui-sm ui-ruta"/>
				<div class="ui-errtip"></div>
			</label>
			<div class="ui-block-btn">
				<a href="#" is="add-ruta" class="btn btn-green success-btn" tabindex="39">
					<i class="fas fa-arrow-alt-down btn-icon-left"></i><h:outputText value="#{msg['lbl.add.tabla']}" escape="false" /></a>
			</div>
		</div>

		<!-- Tabla de rutas -->
		<table id="rutas" class="tb-xeco table-xs rutas-maps">
			<thead>
				<tr>
					<th class="hide-sm">Nº</th>
					<th><h:outputText value="#{msg['lbl.origen.etapa']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.fecha.salida']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.hora.salida']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.destino.etapa']}" escape="false" /> *</th>
					<th><h:outputText value="#{msg['lbl.fecha.llegada']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.hora.llegada']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.medio.trans']}" escape="false" /></th>
					<th class="hide-sm">Km.</th>
					<th class="no-print"></th>
				</tr>
			</thead>
			<tbody></tbody>
			<tfoot>
				<tr>
					<td class="table-refresh" data-refresh="text-render" colspan="8"><h:outputText value="#{msg['lbl.etapas']}" escape="false" />: @size;</td>
					<td class="tb-data-tc hide-xs hide-sm table-refresh" data-refresh="text-render">$totKmCalc;</td>
					<td class="hide-sm no-print"></td>
				</tr>
			</tfoot>
		</table>

		<br/>
		<div class="notice notice-info"><h:outputText value="#{msg['uae.irse.tab2.info.principal']}" escape="false" /></div>
	</div>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-prev" class="btn btn-info" title="#{msg['tit.btn.volver']}">
			<i class="fas fa-caret-left btn-icon-left"></i><h:outputText value="#{msg['lbl.btn.volver']}" escape="false" /></a>
		<a href="#tab-action-paso2" class="btn btn-info" title="#{msg['tit.btn.siguiente']}">
			<h:outputText value="#{msg['lbl.btn.siguiente']}" escape="false" /><i class="fas fa-caret-right btn-icon-right"></i></a>
		<a href="#tab-action-save2" class="btn btn-green form-refresh" data-refresh="isEditable" title="#{msg['tit.btn.no.enviar']}">
			<i class="far fa-save btn-icon-left"></i><h:outputText value="#{msg['lbl.btn.no.enviar']}" escape="false" /></a>
		<ui:include src="../parts/btn_firmar.xhtml"></ui:include>
	</div>
</html>
