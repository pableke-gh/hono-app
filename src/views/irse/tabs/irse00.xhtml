<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<h2 class="underline form-refresh" data-refresh="text-render">@getTitulo; <i>@codigo;</i></h2>
	<div class="card-xeco">
		<h2><img src="/uae/resources/images/speaker.png" width="30px"/><h:outputText value="#{msg['uae.irse.tab0.msg.tit.a']}" escape="false" /></h2>
		<p class="notice notice-info form-refresh" data-refresh="isUxxiec"><h:outputText value="#{msg['uae.irse.tab0.msg.int']}" escape="false" /></p>

		<label class="ui-blocks form-refresh" data-refresh="isUxxiec">
			<div class="label required inline"><h:outputText value="#{msg['uae.irse.tab0.lbl.int']}" escape="false" />:</div>
			<div class="ui-block-xl autocomplete">
				<i class="fas fa-search ui-input-icon left inline"></i>
				<input type="search" name="interesado" is="interesado-input" data-editable="isEditableP0" tabindex="1" class="ui-autocomplete ui-perfil" />
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</div>
			<div class="ui-block-info">
				[<span class="icon"></span>]
				<a href="mailto:" title="#{msg['tit.enviar.correo']}"><i class="fa fa-regular fa-envelope fa-lg icon"></i></a>
			</div>
		</label>

		<label class="ui-blocks">
			<div class="label required inline"><h:outputText value="#{msg['uae.irse.tab0.lbl.ppto']}" escape="false" />:</div>
			<div class="ui-block-xl autocomplete">
				<i class="fas fa-search ui-input-icon left inline"></i>
				<input type="search" name="organica" is="organica-input" data-editable="isEditableP0" tabindex="4" class="ui-autocomplete" title="#{msg['uae.irse.index.msg.cd']}" />
				<ul role="list" class="results"></ul>
				<div class="ui-errtip"></div> 
			</div>
			<div class="ui-block">
				<a href="#tab-action-addOrganica" class="btn btn-green" tabindex="5">
					<i class="ui-button-icon-right ui-icon ui-c fas fa-plus"></i><h:outputText value="#{msg['lbl.add.tabla']}" escape="false" /></a>
			</div>
			<div class="ui-block-info"><h:outputText value="#{msg['lbl.imp.cd']}" escape="false" />: $getCreditoDisp; €</div>
		</label>

		<div class="navbar form-refresh" data-refresh="isUxxiec">
		<table is="organica-table" class="tb-xeco table-xs">
			<thead>
				<tr>
					<th><h:outputText value="#{msg['lbl.organica']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.imp.cd']}" escape="false" /></th>
					<th><h:outputText value="#{msg['lbl.descripcion']}" escape="false" /></th>
					<th>#{msg['lbl.responsable.gasto']}</th><th>#{msg['lbl.nombre.apellidos']}</th>
					<th class="no-print"></th>
				</tr>
			</thead>
			<tbody></tbody>
			<tfoot>
				<tr>
					<td class="table-refresh" data-refresh="text-render" colspan="99"><h:outputText value="#{msg['lbl.organicas']}" escape="false" />: @size;</td>
				</tr>
			</tfoot>
		</table>
		</div>

		<div class="notice notice-info form-refresh" data-refresh="isFin" data-fin="xSU" data-event="perfil"><h:outputText value="#{msg['uae.irse.tab0.fin.xsu.info']}" escape="false" /></div>
		<div class="notice notice-info form-refresh" data-refresh="isFin" data-fin="ISU" data-event="perfil"><h:outputText value="#{msg['uae.irse.tab0.fin.isu.info']}" escape="false" /></div>
		<div class="notice notice-info form-refresh" data-refresh="isFin" data-fin="x83" data-event="perfil"><h:outputText value="#{msg['uae.irse.tab0.fin.x83.info']}" escape="false" /></div>
		<div class="notice notice-info form-refresh" data-refresh="isFin" data-fin="A83" data-event="perfil"><h:outputText value="#{msg['uae.irse.tab0.fin.a83.info']}" escape="false" /></div>
		<div class="notice notice-info"><h:outputText value="#{msg['uae.irse.tab0.org.info']}" escape="false" /></div>

		<label class="ui-blocks">
			<div class="label required inline">#{iris.irse.form.labelActividad}:</div>
			<div class="ui-block">
			<select name="actividad" is="data-list" data-editable="isEditableP0" class="ui-perfil" tabindex="7">
			<c:choose>
				<c:when test="#{iris.user.uxxiec}"> <!-- UXXIEC -->
					<option value="COM">#{msg['uae.irse.tab0.act.com']}</option>
					<option value="MUN">#{msg['uae.irse.tab0.act.mun']}</option>
					<option value="MES">#{msg['uae.irse.tab0.act.mes']}</option>
					<option value="IAE">#{msg['uae.irse.tab0.act.iae']}</option>
					<option value="ATR">#{msg['uae.irse.tab0.act.atr']}</option>
					<option value="IAE+ATR">#{msg['uae.irse.tab0.act.iae.atr']}</option>
					<option value="AFO">#{msg['uae.irse.tab0.act.afo']}</option>
					<option value="IAE+AFO">#{msg['uae.irse.tab0.act.iae.afo']}</option>
					<option value="ACS">#{msg['uae.irse.tab0.act.acs']}</option>
					<option value="OCE">#{msg['uae.irse.tab0.act.col']}</option>
					<option value="IAE+OCE">#{msg['uae.irse.tab0.act.iae.col']}</option>
					<option value="A7J">#{msg['uae.irse.tab0.act.a7j']}</option>
					<option value="MOV">#{msg['uae.irse.tab0.act.mov']}</option>
				</c:when>
				<c:otherwise> <!-- PDI -->
					<option value="COM">Sí</option>
					<option value="MUN">No</option>
				</c:otherwise>
			</c:choose>
			</select>
		</div>
		</label>

		<label class="ui-blocks form-refresh" data-refresh="isUxxiec">
			<div class="label required inline"><h:outputText value="#{msg['uae.irse.tab0.lbl.tramite']}" escape="false" />:</div>
			<div class="ui-block">
			<select name="tramite" is="data-list" data-editable="isEditableP0" class="ui-perfil" tabindex="8">
				<option value="AyL">#{msg['uae.irse.tab0.tramit.ayl']}</option>
				<option value="AUT">#{msg['uae.irse.tab0.tramit.aut']}</option>
				<option value="LIQ">#{msg['uae.irse.tab0.tramit.liq']}</option>
			</select>
			</div>
		</label>
	</div>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-prev" class="btn btn-info" title="#{msg['tit.btn.volver']}" tabindex="12">
			<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>

		<button type="reset" is="btn-form" class="btn btn-light form-refresh" data-refresh="isEditableP0" title="#{msg['tit.btn.limpiar']}" tabindex="13">
			<i class="far fa-broom btn-icon-left"></i>#{msg['lbl.btn.limpiar']}</button> <!-- getId equivale a editableP0 -->
		<a href="#tab-action-paso0" class="btn btn-green" title="#{msg['tit.btn.empezar']}" tabindex="13">
			<h:outputText value="#{msg['lbl.btn.empezar']}" escape="false" /><i class="fas fa-caret-right btn-icon-right"></i></a>

		<a href="#tab-6" class="btn btn-info form-refresh" data-refresh="isResumable" title="#{msg['tit.btn.resumen']}" tabindex="14">
			<h:outputText value="#{msg['lbl.btn.resumen']}" escape="false" /><i class="fas fa-caret-right btn-icon-right"></i></a>
		<ui:include src="../parts/btn_firmar.xhtml"></ui:include>
		<a href="#tab-action-remove" class="btn btn-danger form-refresh" data-refresh="isRemovable" title="Borra la solicitud del sistema"> 
			<i class="fal fa-trash-alt btn-icon-left"></i>Eliminar</a>
	</div>
</html>
