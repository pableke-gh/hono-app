<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core"
		xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

	<h2 class="underline form-refresh" data-refresh="text-render">@getTitulo; <i>@codigo;</i></h2>
	<div class="card-xeco">
		<h2><img src="/uae/resources/images/speaker.png" width="30px"/><h:outputText value="#{msg['uae.irse.tab9.tit']}" escape="false" />​</h2>

		<div class="notice notice-info"><h:outputText value="#{msg['uae.irse.tab9.lbl.cuentas']}" escape="false" /></div>
		<label class="ui-blocks">
			<div class="label required inline"><h:outputText value="#{msg['uae.irse.tab9.lbl.cuenta']}" escape="false" />:</div>
			<div class="ui-block-xl">
			<h:selectOneMenu id="cuentas" value="#{iris.irse.form.cuenta}" pt:is="data-list" styleClass="update-irse update-perfil #{iris.irse.form.cssDisabled}" tabindex="150">
				<f:selectItems value="#{iris.irse.form.cuentas}" />
				<f:selectItem itemValue="" itemLabel="#{msg['lbl.alta.cuenta']}" itemEscaped="false"/>
			</h:selectOneMenu>
		</div>
		</label>

		<div id="grupo-iban" class="navbar hide">
			<div class="notice notice-info"><h:outputText value="#{msg['uae.irse.tab9.msg.iban']}" escape="false" /></div>
			<div class="ui-blocks">
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.pais']}" escape="false" />:</div>
				<h:selectOneMenu id="paises" value="#{iris.irse.gastos.paisEntidad}" pt:is="data-list" styleClass="update-irse #{iris.irse.form.cssDisabled}" tabindex="151">
					<c:forEach items="#{iris.irse.rutas.idPaises}" var="pais" varStatus="loop">
						<f:selectItem itemValue="#{pais}" itemLabel="#{iris.irse.rutas.getPais(loop.index)}"/>
					</c:forEach>
				</h:selectOneMenu>
			</label>
			<label class="ui-block">
				<div class="label required"><h:outputText value="#{msg['lbl.entidad']}" escape="false" />:</div>
				<h:inputText id="banco" value="#{iris.irse.gastos.nombreEntidad}"  pt:is="text-input" maxlength="50" tabindex="152" styleClass="update-irse #{iris.irse.form.cssDisabled} hide" />
				<h:selectOneMenu id="entidades" value="#{iris.irse.gastos.codigoEntidad}" pt:is="data-list" styleClass="update-irse #{iris.irse.form.cssDisabled}" tabindex="152">
					<f:selectItem itemValue="" itemLabel=""/>
					<f:selectItems value="#{iris.irse.gastos.entidades}" var="banco" itemValue="#{banco.value}" itemLabel="#{banco.label}"/>
				</h:selectOneMenu>
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block-lg">
				<div class="label required"><h:outputText value="#{msg['lbl.num.cuenta']}" escape="false" />:</div>
				<h:inputText id="iban" value="#{iris.irse.gastos.iban}" pt:is="text-input" maxlength="50" tabindex="160" styleClass="update-irse update-perfil #{iris.irse.form.cssDisabled}" />
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block swift-block hide">
				<div class="label">Swift:</div>
				<h:inputText id="swift" value="#{iris.irse.gastos.swift}" pt:is="text-input" maxlength="30" tabindex="161" styleClass="ui-code update-irse update-perfil #{iris.irse.form.cssDisabled}" />
				<div class="ui-errtip"></div>
			</label>
			</div>
			<hr/>
		</div>

		<div class="notice notice-info"><h:outputText value="#{msg['uae.irse.tab9.msg.info']}" escape="false" /></div>
		<div class="ui-blocks">
			<label class="ui-block-row">
				<div class="label inline">#{msg['lbl.observaciones']}:</div>
				<h:inputTextarea id="observaciones" value="#{iris.irse.gastos.observaciones}" pt:is="text-area" styleClass="rows-2 update-irse #{iris.irse.form.cssDisabled}" tabindex="180" />
			</label>

			<label class="ui-block">
				<div class="label">#{iris.getMsg('lblUrg')}:</div>
				<h:selectOneMenu id="urgente" value="#{iris.irse.input.urgente}" pt:is="data-list" styleClass="update-irse #{iris.irse.form.cssDisabled}" tabindex="181">
					<f:selectItem itemValue="1" itemLabel="#{iris.getMsg('lblNormal')}" />
					<f:selectItem itemValue="2" itemLabel="#{iris.getMsg('lblUrgente')}" />
				</h:selectOneMenu>
			</label>

			<label class="ui-block form-refresh" data-refresh="isUrgente">
				<div class="label required">#{iris.getMsg('lblFechaUrg')}:</div>
				<h:inputText id="fMax" value="#{iris.irse.form.FMaxIsoDate}" pt:is="date-input" tabindex="183" styleClass="update-irse #{iris.irse.form.cssDisabled}"/>
			</label>
			<label class="ui-block-row form-refresh" data-refresh="isUrgente">
				<div class="label required">#{iris.getMsg('lblMotivoUrg')}:</div>
				<div class="ui-block-main">
					<h:inputTextarea id="extra" value="#{iris.irse.form.extra}" pt:is="text-area" styleClass="rows-2 update-irse #{iris.irse.form.cssDisabled}" tabindex="184"/>
					<div class="hide ui-errtip"></div>
				</div>
			</label>
		</div>
	</div>

	<!-- Tabla de imputación paso 9 -->
	<ui:include src="./irse09_org.xhtml"></ui:include>

	<!-- Botones -->
	<div class="navbar">
		<a href="#tab-0" class="btn btn-info" title="#{msg['tit.btn.paso.0']}" tabindex="190"><i class="fas fa-arrow-to-left"></i></a>
		<a href="#tab-prev" class="btn btn-info" title="#{msg['tit.btn.volver']}" tabindex="191">
			<i class="fas fa-caret-left btn-icon-left"></i><h:outputText value="#{msg['lbl.btn.volver']}" escape="false" /></a>

		<a href="#tab-action-save9" class="btn btn-warn form-refresh" data-refresh="isEditable" title="#{msg['lbl.btn.no.enviar']}">
			<i class="far fa-save btn-icon-left"></i><h:outputText value="#{msg['lbl.btn.no.enviar']}" escape="false" /></a>
		<p:remoteCommand name="rcSave9" action="#{iris.irse.form.save9()}" oncomplete="showAlerts(xhr, status, args)" />
		<a href="#tab-action-send" class="btn btn-green form-refresh" data-refresh="isEditable" title="#{msg['tit.btn.firmar.enviar']}">
			<i class="far fa-file-signature btn-icon-left"></i><h:outputText value="#{msg['lbl.btn.enviar']}" escape="false" /></a>
		<p:remoteCommand name="rcSend" action="#{iris.irse.form.send()}" oncomplete="closeForm(xhr, status, args)" />

		<ui:include src="../parts/btn_firmar.xhtml"></ui:include>
		<ui:include src="../parts/btn_doc.xhtml"></ui:include>
	</div>
</html>
