<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<form id="recibos" is="recibos-form" class="card-filter no-print">
		<div class="ui-blocks">
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.ejercicio']}" escape="false" />:</div>
				<select name="ej" is="data-list" class="editable-manual"></select>
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block">
				<div class="label">Tipo:</div>
				<select name="tipo" is="data-list" class="editable-manual">
					<option value="43">N43</option>
					<option value="57">N57</option>
				</select>
				<div class="ui-errtip"></div>
			</label>
			<label class="ui-block">
				<div class="label">Fecha:</div>
				<input type="date" name="fecha" is="date-input" class="editable-manual"/>
			</label>
		</div>

		<div class="navbar">
			<a href="#tab-back" class="btn btn-info" title="#{msg['tit.btn.volver']}"><i class="fas fa-caret-left"></i>#{msg['lbl.btn.volver']}</a>
			<button type="submit" class="btn btn-info"><i class="far fa-search"></i>Buscar</button>
			<button type="reset" class="btn btn-warn"><i class="far fa-times-circle"></i>Limpiar</button>
		</div>
	</form>
	<div is="recibos-accordion" class="navbar"></div>
</html>
