<ui:composition
		template="/templates/layout/private-embed-layout.xhtml"
		xmlns="http://www.w3.org/1999/xhtml"
        xmlns:c="http://java.sun.com/jsp/jstl/core"
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:o="http://omnifaces.org/ui"
		xmlns:p="http://primefaces.org/ui"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:f="http://java.sun.com/jsf/core">

	<ui:define name="metadata">
		<f:metadata>
            <f:viewParam name="lang" value="#{becas.lang}" />
            <f:viewAction action="#{becas.initLang()}" />
		</f:metadata>
	</ui:define>
	<ui:define name="header">
		<link rel="stylesheet" type="text/css" href="/uae/resources/css/styles-min.css" />
	</ui:define>
	<ui:define name="outputScript">
		<script type="module" src="/uae/resources/js/becas/index.js"></script>
	</ui:define>

	<ui:define name="title">BECAS</ui:define>
	<ui:define name="description">Comunicación de sbuvenciones, becas y premios</ui:define>
	<ui:define name="semilla"><li class="active">BECAS</li></ui:define>

	<ui:define name="body">
		<!-- Home tab -->
		<div id="tab-init" is="tab-content" class="tab-content active">
			<ui:include src="./tabs/init.xhtml"></ui:include>
		</div>

		<!-- listado de solicitudes -->
		<div id="tab-list" is="tab-list" class="tab-content">
			<ui:include src="./tabs/list.xhtml"></ui:include>
			<ui:include src="./parts/leyenda_firmas.xhtml"></ui:include>
		</div>

		<!-- vinculación con uxxiec -->
		<div id="tab-uxxiec" is="tab-content" class="tab-content">
			<ui:include src="./tabs/uxxiec.xhtml"></ui:include>
		</div>

		<form id="beca" is="beca-form" method="post" enctype="multipart/form-data"
				data-nif="#{becas.user.nif}" data-grupo="#{becas.user.idGrupo}" data-admin="#{becas.user.adminFlag}">
			<!-- Form beca -->
			<div id="tab-form" is="tab-content" class="tab-content">
				<ui:include src="./tabs/form.xhtml"></ui:include>
			</div>
			<div id="tab-tercero" is="tab-tercero" class="tab-content">
				<ui:include src="./tabs/tercero.xhtml"></ui:include>
			</div>
			<!-- formulario de rechazo/cancelacion -->
			<div id="tab-reject" is="tab-content" class="tab-content">
				<ui:include src="./tabs/reject.xhtml"></ui:include>
			</div>
		</form>
	</ui:define>
</ui:composition>
