<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Página de Inicio</title>

	<link rel="stylesheet" href="../public/css/styles-min.css"/>
	<style>
		select.ui-select {
			appearance: base-select;
			option {
				display: flex; justify-content: flex-start; gap: 20px;
				border: 2px solid #dddddd; background: #eeeeee; transition: 0.4s;
			}
			option:nth-of-type(odd) { background: white; }
			option:hover, option:focus { background: plum; }

			::picker(select) { appearance: base-select; }
			::picker-icon { transition: 0.4s rotate; }
			:open::picker-icon { rotate: 180deg; }
		}
	</style>
	<script type="text/javascript" src="https://kit.fontawesome.com/76f12cea70.js" crossorigin="anonymous"></script>
	<script type="module" src="../public/js/web/index.js" defer></script>
</head>
<body>
	<div class="alerts"></div>

	<form id="test-form" is="test-form" class="search-form">
		<div id="tab-0" is="tab-content" class="tab-content active">
			<div class="ui-blocks">
				<div class="ui-block-btn">
					<a href="#load-excel" class="btn btn-info"><i class="fas fa-search"></i>Leer Excel</a>
					<input type="file" name="excel" is="excel-file" class="hide" data-filename=".excel-name" accept=".xls, .xlsx"/>
					<div class="ui-errtip"></div> 
				</div>
				<div class="ui-block-row text-height excel-name"></div>
				<label class="ui-block">
					<div class="label">Select pet:</div>
					<select is="data-list" name="pet" class="ui-input ui-select" data-empty="Please select a pet">
						<button type="button" class="default-element">
							<selectedcontent></selectedcontent>
						</button>

						<option value="cat">
							<span class="icon" aria-hidden="true">🐱</span><span class="option-label">Cat</span>
						</option>
						<option value="dog">
							<span class="icon" aria-hidden="true">🐶</span><span class="option-label">Dog</span>
						</option>
						<option value="hamster">
							<span class="icon" aria-hidden="true">🐹</span><span class="option-label">Hamster</span>
						</option>
						<option value="chicken">
							<span class="icon" aria-hidden="true">🐔</span><span class="option-label">Chicken</span>
						</option>
						<option value="fish">
							<span class="icon" aria-hidden="true">🐟</span><span class="option-label">Fish</span>
						</option>
						<option value="snake">
							<span class="icon" aria-hidden="true">🐍</span><span class="option-label">Snake</span>
						</option>
					</select>
				</label>
			</div>

			<div class="navbar">
				<a href="#tab-prev" class="btn btn-info"><i class="fas fa-caret-left"></i>Volver</a>
				<a href="#tab-next" class="btn btn-info">Siguiente<i class="fas fa-caret-right"></i></a>
				<a href="#load-2" class="btn btn-success">Load data 1</a>
			</div>
		</div>

		<div id="tab-1" is="tab-content">
			<div class="ui-blocks">
				<div class="ui-block-btn">
					<a href="#parse-ocr" class="btn btn-info"><i class="fas fa-search"></i>Fichero OCR</a>
					<input type="file" name="ocr" is="ocr-file" class="hide" data-filename=".ocr-file" accept=".pdf, image/*"/>
					<div class="ui-errtip"></div> 
				</div>
				<div class="ui-block-row text-height ocr-file"></div>
			</div>

			<div class="navbar">
				<a href="#tab-prev" class="btn btn-info"><i class="fas fa-caret-left"></i>Volver</a>
				<a href="#tab-next" class="btn btn-info">Siguiente<i class="fas fa-caret-right"></i></a>
				<a href="#load-1" class="btn btn-success">Load data 2</a>
			</div>
		</div>
	</form>

	<div is="firmas-block" class="navbar">
		<hr/>
		<h3>Firmantes:</h3>
		<div class="ui-blocks"></div>
		<p class="notice notice-error">Motivo del rechazo: (@rejectedBy;) @info;</p>
	</div>

	<hr/>
	<div class="ui-blocks">
		<span><i class="fas fa-flag text-warn icon"></i>Pendiente</span> 
		<span><i class="fas fa-flag text-green icon"></i>Aceptada</span>
		<span><i class="fas fa-flag text-error icon"></i>Rechazada</span>
	</div>
</body>
</html>
