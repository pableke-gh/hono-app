<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<div class="card-xeco form-refresh" data-refresh="isPartidaDec">
		<h2>Partida que Disminuye</h2>
		<div class="ui-blocks">
		<label class="ui-block">
			<div class="label">Ejercicio:</div>
			<select name="ej" is="data-list" class="ui-ej" data-editable="is-editable-ej-dec" tabindex="5"></select>
		</label>
		<label class="ui-block-xl autocomplete">
			<div class="label required">Orgánica:</div>
			<input type="search" id="acOrgDec" name="acOrgDec" is="text-input" class="ui-autocomplete" tabindex="6" /> 
			<input type="text" name="idOrgDec" is="text-input" class="hide" />
			<ul role="list" class="results"></ul>
			<div class="ui-errtip"></div> 
		</label>
		<label class="ui-block">
			<div class="label" title="Orgánica afectada">FA:</div>
			<input id="faDec" name="faDec" is="bool-input" class="disabled" tabindex="-1" disabled title="Orgánica afectada" />
		</label>
		<label class="ui-block">
			<div class="label required">Económica:</div>
			<select id="idEcoDec" name="idEcoDec" is="data-list" class="ui-pf" data-editable="isEditable" tabindex="7"></select>
			<div class="ui-errtip"></div>
		</label>
		<label class="ui-block">
			<div class="label required">Importe:</div>
			<input type="text" name="impDec" is="float-input" tabindex="8" class="ui-input" data-editable="isEditable"/> €
			<div class="ui-errtip"></div>
		</label>
		<label class="ui-block form-refresh" data-refresh="isImpCd">
			<div class="label required">Importe Disponible:</div>
			<input type="text" id="cd" name="cd" is="float-input" tabindex="-1" class="disabled" disabled /> €
			<div class="ui-errtip"></div>
		</label>
		</div>
	</div>
</html>
