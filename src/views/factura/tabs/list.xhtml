<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:p="http://primefaces.org/ui" 
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:c="http://java.sun.com/jsp/jstl/core">

	<form is="filter-form" action="/uae/fact">
		<h2 class="underline">Solicitudes realizadas</h2>

		<div class="ui-blocks">
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.ejercicio']}" escape="false" />:</div>
				<select name="ej" is="data-list"></select>
			</label>
			<label class="ui-block">
				<div class="label">Tipo:</div>
				<select name="tipo" is="data-list" class="ui-filter" tabindex="2">
					<option value="0"></option>
					<option value="1">Factura</option>
					<option value="3">Carta de pago</option>
					<option value="4">Recibo de alumno</option>
					<option value="5">Factura de congreso</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.estado']}" escape="false" />:</div>
				<select name="estado" is="data-list" class="ui-filter" tabindex="2" title="#{msg['tit.estado']}">
					<option value="0"></option>
					<option value="5">En Proceso</option>
					<option value="1">Aceptada</option>
					<option value="2">Rechazada</option>
					<option value="3">Ejecutando</option>
					<option value="4">Integrada</option>
					<option value="7">Cancelada</option>
					<option value="8">Caducada</option>
					<c:if test="#{fact.user.uae}">
						<optgroup label="--------------------------------">
							<option value="9">Error Capa SOA</option>
						</optgroup>
					</c:if>
				</select>
			</label>
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.mi.firma']}" escape="false" />:</div>
				<select name="fmask" is="data-list" class="ui-filter" tabindex="3" title="#{msg['lbl.mi.firma']}">
					<option value="0"></option>
					<option value="5" selected>Pendiente</option>
					<option value="1">Aceptada</option>
					<option value="2">Rechazada</option>
				</select>
			</label>
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.codigo']}" escape="false" />:</div>
				<input type="text" name="codigo" is="text-input" class="ui-code ui-filter" tabindex="4" />
			</label>
			<label class="ui-block">
				<div class="label"><h:outputText value="#{msg['lbl.organica']}" escape="false" />:</div>
				<input type="text" name="org" is="text-input" class="ui-code ui-filter" tabindex="5" />
			</label>
			<label class="ui-block">
				<div class="fInicio"><h:outputText value="#{msg['lbl.fecha.creacion']}" escape="false" />:</div>
				<input type="date" name="f1" is="date-input" tabindex="6" class="ui-filter"/> ...
				<input type="date" name="f2" is="date-input" tabindex="7" class="ui-filter"/>
			</label>
			<label class="ui-block-lg">
				<div class="label">Solicitante:</div>
				<input type="text" name="solicitante" is="text-input" class="ui-filter" tabindex="8" />
			</label>
		</div>

		<div class="navbar">
			<a href="#tab-init" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}" tabindex="13">
				<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
			<button type="submit" is="btn-form" class="btn btn-info" tabindex="13"><i class="far fa-search btn-icon-left"></i>Buscar</button>
			<a href="#tab-action-relist" class="btn btn-warn" tabindex="14"><i class="far fa-times-circle btn-icon-left"></i>Limpiar</a>
		</div>
	</form>

	<table is="fact-table" class="tb-xeco">
		<thead>
			<tr>
				<th>Código</th><th class="hide-sm">Tipo</th><th class="hide-xs">Estado</th>
				<th class="hide-xs"><h:outputText value="#{msg['lbl.mi.firma']}" escape="false" /></th>
				<th class="hide-sm"><h:outputText value="#{msg['lbl.sig.firma']}" escape="false" /></th>
				<th class="hide-xs">F. Creación</th><th>Importe</th>
				<th>Tercero</th><th class="hide-xs">Nombre del Tercero</th>
				<th>Orgánica</th><th class="hide-sm">Desc. Orgánica</th>
				<th class="hide-sm">Solicitante</th>
				<th class="no-print">Acciones</th>
			</tr>
		</thead>
		<tbody></tbody>
		<tfoot>
			<tr><td colspan="99" class="table-refresh" data-refresh="text-render">Solicitudes: @size;</td></tr>
		</tfoot>
	</table>

	<a href="#tab-init" class="btn btn-info" title="#{msg['tit.btn.volver.ini']}">
		<i class="fas fa-caret-left btn-icon-left"></i>#{msg['lbl.btn.volver']}</a>
</html>
